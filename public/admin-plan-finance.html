<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administration Monthly Plan & Finance Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style id="sys-styles">
    :root {
      --ov-bg: #f7f4ef;
      --ov-surface: #ffffff;
      --ov-cream: #ede8df;
      --ov-border: #e0d9d0;
      --ov-ink: #1a1a2e;
      --ov-muted: #8a8378;
      --ov-red: #c8553d;
      --ov-gold: #d4a853;
      --ov-teal: #2d6a6a;
      --ov-green: #3a7d44;
      --ov-blue: #2c5f8a;
      --ov-purple: #6b4c8a;
      --ov-header: #1a1a2e;
      --fn-bg: #0d1117;
      --fn-surface: #161b22;
      --fn-surface2: #1c2333;
      --fn-surface3: #21262d;
      --fn-border: rgba(255, 255, 255, 0.07);
      --fn-emerald: #00c896;
      --fn-emerald-glow: rgba(0, 200, 150, 0.15);
      --fn-amber: #f0b429;
      --fn-sky: #5bc8f5;
      --fn-red: #ff6b6b;
      --fn-purple: #b18aff;
      --font-playfair: "Playfair Display", Georgia, serif;
      --font-syne: "Syne", system-ui, sans-serif;
      --font-dm: "DM Sans", system-ui, sans-serif;
      --font-mono: "DM Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body.ov-active {
      font-family: var(--font-dm);
      font-weight: 400;
      background: var(--ov-bg);
      color: var(--ov-ink);
    }
    body.fn-active {
      font-family: var(--font-dm);
      background: var(--fn-bg);
      color: #e6edf3;
    }
    .page-hidden { display: none !important; }
    .page-flex { display: flex; flex-direction: column; min-height: 100vh; animation: fadeIn 0.35s ease; }
    #page-overview.page-flex > .ov-shell { flex: 1; min-height: 0; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* —— Overview: fixed header —— */
    .ov-header {
      position: sticky; top: 0; z-index: 100;
      width: 100%; background: var(--ov-header);
      border-bottom: 3px solid var(--ov-gold);
      color: #fff;
      display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between;
      gap: 16px; padding: 16px 24px;
    }
    .ov-header-brand h1 {
      font-family: var(--font-playfair); font-weight: 700; font-size: 1.5rem; margin: 0 0 4px;
      color: #fff;
    }
    .ov-header-brand p { margin: 0; font-size: 0.8rem; color: rgba(255,255,255,0.55); }
    .ov-header-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    .ov-pill-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; padding: 4px 12px 4px 14px; border: 1px solid rgba(255,255,255,0.12); }
    .ov-pill-wrap label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
    .ov-pill-wrap select {
      background: transparent; border: none; color: #fff; font-family: var(--font-dm); font-size: 0.85rem; cursor: pointer;
    }
    .ov-year-badge {
      font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500;
      background: var(--ov-gold); color: var(--ov-header); padding: 6px 12px; border-radius: 8px;
    }
    .ov-btn-finance {
      font-family: var(--font-dm); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35);
    }
    .ov-btn-finance:hover { background: rgba(255,255,255,0.08); border-color: var(--ov-gold); }
    .ov-btn-reset {
      font-family: var(--font-dm); font-size: 0.78rem; padding: 8px 14px; border-radius: 8px; cursor: pointer;
      background: transparent; border: 1px solid rgba(200,85,61,0.45); color: #e8a090;
    }
    .ov-btn-reset:hover { background: rgba(200,85,61,0.12); }
    /* Team strip */
    .ov-team-strip {
      background: var(--ov-cream); border-bottom: 1px solid var(--ov-border);
      padding: 12px 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    }
    .ov-team-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; color: var(--ov-muted); text-transform: uppercase; margin-right: 6px; }
    .ov-chip {
      display: inline-flex; flex-direction: column; align-items: flex-start; gap: 2px;
      padding: 8px 14px; border-radius: 999px; background: var(--ov-surface); border: 1px solid var(--ov-border);
      cursor: default; transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .ov-chip strong { font-size: 0.78rem; font-weight: 600; color: var(--ov-ink); }
    .ov-chip .role { font-size: 0.62rem; color: var(--ov-muted); font-weight: 500; }
    .ov-chip:hover { background: var(--ov-header); border-color: var(--ov-header); }
    .ov-chip:hover strong { color: #fff; }
    .ov-chip:hover .role { color: var(--ov-gold); }
    /* Two column */
    .ov-shell { display: flex; flex: 1; min-height: 0; }
    .ov-sidebar {
      width: 248px; flex-shrink: 0; background: var(--ov-surface); border-right: 1px solid var(--ov-border);
      padding: 18px 12px; overflow-y: auto;
    }
    .ov-nav-group { margin-bottom: 18px; }
    .ov-nav-group > h3 { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em; color: var(--ov-muted); text-transform: uppercase; margin: 0 0 8px 10px; }
    .ov-nav-item {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 9px 10px; margin-bottom: 2px; border: none; border-radius: 8px; background: transparent;
      cursor: pointer; font-family: var(--font-dm); font-size: 0.8rem; color: var(--ov-ink); text-align: left;
    }
    .ov-nav-item:hover { background: var(--ov-cream); }
    .ov-nav-item.active { background: rgba(200,85,61,0.08); box-shadow: inset 3px 0 0 var(--ov-red); }
    .ov-nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .ov-nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ov-nav-badge { font-family: var(--font-mono); font-size: 0.68rem; color: var(--ov-muted); }
    .ov-sidebar-foot { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--ov-border); font-size: 0.75rem; font-weight: 500; color: var(--ov-muted); text-align: center; }
    .ov-main { flex: 1; padding: 28px 36px; overflow-y: auto; }
    .ov-main h2 { font-family: var(--font-playfair); font-size: 1.55rem; font-weight: 600; margin: 0 0 6px; }
    .ov-main .sub { margin: 0 0 20px; color: var(--ov-muted); font-size: 0.9rem; }
    .ov-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 22px; }
    @media (max-width: 900px) { .ov-stats { grid-template-columns: repeat(2, 1fr); } }
    .ov-stat {
      background: var(--ov-surface); border: 1px solid var(--ov-border); border-radius: 10px; padding: 14px 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ov-stat:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,26,46,0.08); }
    .ov-stat .lbl { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; color: var(--ov-muted); text-transform: uppercase; }
    .ov-stat .num { font-family: var(--font-mono); font-size: 1.35rem; font-weight: 500; margin-top: 6px; color: var(--ov-ink); }
    .ov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .ov-card {
      background: var(--ov-surface); border: 1px solid var(--ov-border); border-radius: 12px; padding: 14px 16px;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-top-width 0.2s;
      border-top: 3px solid var(--card-accent, var(--ov-blue));
    }
    .ov-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,26,46,0.1); border-top-width: 4px; }
    .ov-card-head { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .ov-card-emoji { font-size: 1.3rem; line-height: 1; }
    .ov-card-title { font-family: var(--font-playfair); font-size: 1.02rem; font-weight: 600; margin: 0; color: var(--ov-ink); }
    .ov-card ul { list-style: none; margin: 0 0 10px; padding: 0; }
    .ov-card li { font-size: 0.78rem; color: var(--ov-muted); padding: 3px 0 3px 12px; position: relative; }
    .ov-card li::before { content: ''; position: absolute; left: 0; top: 0.55em; width: 5px; height: 5px; border-radius: 50%; background: var(--card-accent); }
    .ov-card-more { font-size: 0.72rem; color: var(--ov-gold); font-weight: 500; margin-bottom: 8px; }
    .ov-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 10px; border-top: 1px solid var(--ov-border); margin-top: 4px; }
    .ov-freq { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 999px; background: var(--ov-cream); color: var(--ov-muted); border: 1px solid var(--ov-border); }
    .ov-mini-track { flex: 1; max-width: 110px; height: 4px; background: rgba(138,131,120,0.2); border-radius: 2px; overflow: hidden; }
    .ov-mini-fill { height: 100%; background: var(--ov-green); border-radius: 2px; transition: width 0.25s ease; }
    .ov-mini-frac { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ov-muted); }
    /* Detail */
    .ov-detail-back {
      font-family: var(--font-dm); font-size: 0.85rem; margin-bottom: 18px; cursor: pointer; border: none; background: none; color: var(--ov-blue); font-weight: 600;
    }
    .ov-detail-back:hover { text-decoration: underline; }
    .ov-detail-head { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .ov-detail-left { display: flex; gap: 14px; align-items: flex-start; }
    .ov-detail-icon {
      width: 52px; height: 52px; border-radius: 10px; background: var(--ov-cream); border: 1px solid var(--ov-border);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .ov-detail-left h2 { font-family: var(--font-playfair); font-size: 1.6rem; font-weight: 700; margin: 0 0 4px; }
    .ov-detail-left .desc { margin: 0; font-size: 0.85rem; color: var(--ov-muted); max-width: 520px; }
    .ov-freq-pos { align-self: flex-start; }
    .ov-freq.monthly { background: #e6f4ea; color: #1e5f2f; border-color: #b7dfc4; }
    .ov-freq.annual { background: #e8eefc; color: #2c5f8a; border-color: #c5d4ec; }
    .ov-freq.asneeded { background: #fce8f0; color: #9d174d; border-color: #f5c6d8; }
    .ov-freq.mixed { background: #faf3e0; color: #7a5c1e; border: 1px solid var(--ov-border); }
    .ov-progress-row { margin-bottom: 18px; }
    .ov-progress-row .bar { height: 10px; background: rgba(138,131,120,0.2); border-radius: 5px; overflow: hidden; }
    .ov-progress-row .fill { height: 100%; background: var(--ov-green); border-radius: 5px; transition: width 0.3s ease; }
    .ov-progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.85rem; }
    .ov-progress-meta span { font-family: var(--font-mono); }
    .ov-task-card { background: var(--ov-surface); border: 1px solid var(--ov-border); border-radius: 12px; padding: 4px 0; }
    .ov-task-row {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--ov-border); cursor: pointer;
    }
    .ov-task-row:last-child { border-bottom: none; }
    .ov-task-row:hover { background: var(--ov-cream); }
    .ov-cb {
      width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--ov-border); flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center; background: #fff;
    }
    .ov-cb.on { background: var(--ov-green); border-color: var(--ov-green); color: #fff; }
    .ov-cb svg { width: 12px; height: 12px; }
    .ov-task-mid { flex: 1; min-width: 0; }
    .ov-task-mid .name { font-size: 0.9rem; font-weight: 500; color: var(--ov-ink); }
    .ov-task-mid .name.done { text-decoration: line-through; color: var(--ov-muted); }
    .ov-task-mid .sub { font-size: 0.75rem; color: var(--ov-muted); margin-top: 2px; }
    .ov-tag { font-family: var(--font-mono); font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; background: var(--ov-cream); color: var(--ov-muted); border: 1px solid var(--ov-border); }
    .ov-insurance-boxes { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .ov-info-box { background: var(--ov-cream); border: 1px solid var(--ov-border); border-radius: 10px; padding: 12px 14px; font-size: 0.8rem; color: var(--ov-muted); }
    .ov-info-box strong { display: block; color: var(--ov-ink); margin-bottom: 6px; font-family: var(--font-playfair); }
    .ov-table-wrap { overflow-x: auto; margin-bottom: 16px; }
    .ov-data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; border: 1px solid var(--ov-border); border-radius: 10px; overflow: hidden; }
    .ov-data-table th { background: var(--ov-header); color: #fff; text-align: left; padding: 10px 12px; font-weight: 600; }
    .ov-data-table td { padding: 10px 12px; border-top: 1px solid var(--ov-border); background: var(--ov-surface); }
    .ov-data-table select { font-family: var(--font-dm); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--ov-border); width: 100%; max-width: 200px; }
    .ov-data-table select.sel-green { background: #e6f4ea; border-color: var(--ov-green); color: #14532a; }
    .ov-data-table select.sel-amber { background: #fff8e6; border-color: var(--ov-gold); color: #7a5c1e; }
    .ov-event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .ov-event-card { background: var(--ov-surface); border: 1px solid var(--ov-border); border-radius: 12px; overflow: hidden; }
    .ov-event-date { background: var(--ov-header); color: #fff; padding: 12px; text-align: center; }
    .ov-event-date .mo { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; color: var(--ov-gold); text-transform: uppercase; }
    .ov-event-date .day { font-family: var(--font-playfair); font-size: 1.75rem; font-weight: 700; line-height: 1.1; }
    .ov-event-body { padding: 12px 14px; }
    .ov-event-body h4 { margin: 0 0 6px; font-size: 0.95rem; font-family: var(--font-playfair); }
    .ov-event-body p { margin: 0; font-size: 0.78rem; color: var(--ov-muted); }
    /* Finance page */
    .fn-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--fn-bg); animation: fadeIn 0.35s ease; }
    .fn-top {
      background: var(--fn-surface); border-bottom: 1px solid var(--fn-border); box-shadow: 0 3px 0 var(--ov-gold);
      padding: 14px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px;
    }
    .fn-top-left { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }
    .fn-back {
      font-family: var(--font-dm); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--fn-emerald);
      background: none; border: none; cursor: pointer; text-transform: uppercase;
    }
    .fn-back:hover { text-decoration: underline; }
    .fn-divider { width: 1px; height: 28px; background: var(--fn-border); }
    .fn-icon-box {
      width: 34px; height: 34px; border-radius: 8px; background: var(--fn-emerald-glow); border: 1px solid rgba(0,200,150,0.35);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .fn-titles h1 { font-family: var(--font-syne); font-weight: 800; font-size: 1.1rem; margin: 0; letter-spacing: 0.02em; text-transform: uppercase; }
    .fn-titles p { margin: 4px 0 0; font-family: var(--font-mono); font-size: 0.72rem; color: #8b949e; }
    .fn-top-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .fn-completion { display: flex; align-items: center; gap: 10px; }
    .fn-completion span { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; color: #8b949e; text-transform: uppercase; }
    .fn-pill-track { width: 100px; height: 8px; background: var(--fn-surface3); border-radius: 4px; overflow: hidden; }
    .fn-pill-fill { height: 100%; background: var(--fn-emerald); border-radius: 4px; transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
    .fn-pct { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500; color: var(--fn-emerald); min-width: 38px; }
    .fn-btn-ghost {
      font-family: var(--font-dm); font-size: 0.75rem; font-weight: 600; padding: 8px 14px; border-radius: 8px;
      background: transparent; border: 1px dashed var(--fn-border); color: #8b949e; cursor: pointer;
    }
    .fn-btn-ghost:hover { border-color: var(--fn-emerald); color: var(--fn-emerald); box-shadow: 0 0 20px var(--fn-emerald-glow); }
    .fn-btn-primary {
      font-family: var(--font-dm); font-size: 0.75rem; font-weight: 700; padding: 8px 16px; border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--fn-emerald); color: #0d1117; border: none;
    }
    .fn-btn-primary:hover { box-shadow: 0 0 24px var(--fn-emerald-glow); }
    .fn-meta { padding: 16px 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; border-bottom: 1px solid var(--fn-border); }
    .fn-field label { display: block; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; }
    .fn-field input, .fn-field select {
      background: var(--fn-surface2); border: 1px solid var(--fn-border); border-radius: 8px; padding: 8px 12px;
      color: #e6edf3; font-family: var(--font-dm); font-size: 0.85rem;
    }
    .fn-field input:focus, .fn-field select:focus { outline: none; border-color: var(--fn-emerald); box-shadow: 0 0 0 2px var(--fn-emerald-glow); }
    .fn-field.title input { min-width: 260px; }
    .fn-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--fn-border); border-bottom: 1px solid var(--fn-border); }
    .fn-stat-cell { background: var(--fn-surface); padding: 14px 12px; text-align: center; }
    .fn-stat-cell .dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 8px; }
    .fn-stat-cell .n { font-family: var(--font-syne); font-size: 1.5rem; font-weight: 700; }
    .fn-stat-cell .lbl { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; color: #8b949e; text-transform: uppercase; margin-top: 4px; }
    .fn-table-scroll { flex: 1; min-height: 200px; overflow: auto; padding: 0 16px 20px; }
    .fn-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.78rem; }
    .fn-table thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--fn-emerald); color: #0d1117; font-family: var(--font-syne); font-weight: 700; font-size: 0.62rem;
      letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 10px; text-align: left; border-bottom: 2px solid #00a67c;
    }
    .fn-table thead th.center { text-align: center; }
    .fn-table thead th.sortable { cursor: pointer; user-select: none; }
    .fn-table thead th.sortable:hover { filter: brightness(1.05); }
    .fn-table tbody tr { animation: rowIn 0.35s ease backwards; }
    @keyframes rowIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fn-table tbody td { padding: 10px; border-bottom: 1px solid var(--fn-border); background: var(--fn-surface); vertical-align: top; }
    .fn-table tbody tr:hover td { background: var(--fn-surface2); }
    .fn-table tbody tr.row-done td { opacity: 0.55; }
    .fn-table tbody tr.row-done .task-name { text-decoration: line-through; }
    .fn-idx { font-family: var(--font-mono); color: #8b949e; font-size: 0.75rem; }
    .fn-task-code { font-family: var(--font-mono); font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; }
    .fn-task-name { min-height: 1.2em; outline: none; color: #e6edf3; }
    .fn-status-select { appearance: none; font-family: var(--font-dm); font-weight: 600; font-size: 0.72rem; padding: 6px 10px; border-radius: 999px; border: none; cursor: pointer; }
    .fn-status-planning { background: #264d60; color: var(--fn-sky); }
    .fn-status-progress { background: #3d3200; color: var(--fn-amber); }
    .fn-status-review { background: #2d1f4e; color: var(--fn-purple); }
    .fn-status-done { background: #0d3626; color: #3de07a; }
    .fn-status-blocked { background: #3d1515; color: var(--fn-red); }
    .fn-submitted { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.12); color: #e6edf3; font-family: var(--font-mono); font-size: 0.75rem; padding: 4px 0; }

      tasks: [

    { id: 'welfare', title: 'Welfare Society', emoji: '\uD83E\uDD1D', accent: '#c8553d', freq: 'monthly', kind: 'check',

      tasks: [

  var NAV_GROUPS = [
    { section: 'Overview', items: [{ id: 'dashboard', label: 'Dashboard', dot: '#c8553d' }] },
    { section: 'HR & People', items: [
      { id: 'recruitment', label: 'Recruitment', dot: '#2c5f8a' },

      { id: 'skill', label: 'Skill Development', dot: '#6b4c8a' },

    ]}
  ];

  function modById(id) {
    for (var i = 0; i < MODULES.length; i++) if (MODULES[i].id === id) return MODULES[i];
    return null;
  }

  function allCheckKeys(m) {
    var keys = [];
    if (m.kind === 'check' && m.tasks) {
      for (var i = 0; i < m.tasks.length; i++) keys.push(m.id + ':' + i);
    }
    if (m.kind === 'insurance') {
      for (var li = 0; li < m.lifeTasks.length; li++) keys.push(m.id + ':life:' + li);
      for (var gi = 0; gi < m.generalTasks.length; gi++) keys.push(m.id + ':gen:' + gi);
    }
    if (m.kind === 'events' && m.events) {
      for (var e = 0; e < m.events.length; e++) keys.push(m.id + ':ev:' + e);
    }
    return keys;
  }

  function moduleTotalSlots(m) {
    if (m.kind === 'check' && m.tasks) return m.tasks.length;
    if (m.kind === 'insurance') return m.lifeTasks.length + m.generalTasks.length;
    if (m.kind === 'events') return m.events.length;
    if (m.kind === 'awards') return m.awardRows.length;
    if (m.kind === 'allowances') return m.allowanceRows.length;
    return 0;
  }

  function moduleDoneCount(m, plan) {
    var d = 0;
    if (m.kind === 'check' && m.tasks) {
      for (var i = 0; i < m.tasks.length; i++) if (plan.checks[m.id + ':' + i]) d++;
    }
    if (m.kind === 'insurance') {
      for (var li = 0; li < m.lifeTasks.length; li++) if (plan.checks[m.id + ':life:' + li]) d++;
      for (var gi = 0; gi < m.generalTasks.length; gi++) if (plan.checks[m.id + ':gen:' + gi]) d++;
    }
    if (m.kind === 'events') {
      for (var e = 0; e < m.events.length; e++) if (plan.checks[m.id + ':ev:' + e]) d++;
    }
    if (m.kind === 'awards') {
      for (var a = 0; a < m.awardRows.length; a++) {
        var st = plan.awards[m.id + ':' + a] || 'Pending';
        if (st === 'Awarded') d++;
      }
    }
    if (m.kind === 'allowances') {
      for (var x = 0; x < m.allowanceRows.length; x++) {
        var z = plan.allowances[m.id + ':' + x] || 'Pending';
        if (z === 'Paid') d++;
      }
    }
    return d;
  }

  function globalTotals(plan) {
    var total = 0, done = 0, annual = 0;
    for (var i = 0; i < MODULES.length; i++) {
      var m = MODULES[i];
      total += moduleTotalSlots(m);
      done += moduleDoneCount(m, plan);
      if (m.freq === 'annual' && m.events) annual += m.events.length;
    }
    return { total: total, done: done, annual: annual, modules: MODULES.length };
  }

  function loadPlan() {
    try {
      var raw = localStorage.getItem(LS_PLAN);
      if (raw) {
        var p = JSON.parse(raw);
        return {
          month: p.month || 3,
          year: p.year || 2026,
          checks: p.checks || {},
          awards: p.awards || {},
          allowances: p.allowances || {},
          nav: p.nav || 'dashboard',
          detail: p.detail || null
        };
      }
    } catch (e) {}
    return { month: 3, year: 2026, checks: {}, awards: {}, allowances: {}, nav: 'dashboard', detail: null };
  }

  function savePlan(p) {
    localStorage.setItem(LS_PLAN, JSON.stringify(p));
  }

  var plan = loadPlan();

  function checkSvg() {
    return '<svg viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
  }

  function freqClass(f) {
    if (f === 'monthly') return 'monthly';
    if (f === 'annual') return 'annual';
    if (f === 'mixed') return 'mixed';
    return 'asneeded';
  }

  function freqLabel(f) {
    if (f === 'monthly') return 'MONTHLY';
    if (f === 'annual') return 'ANNUAL';
    if (f === 'mixed') return 'MONTHLY / ANNUAL';
    return 'AS NEEDED';
  }

  function previewTasks(m) {
    if (m.kind === 'check' && m.tasks) return m.tasks;
    if (m.kind === 'insurance') return m.lifeTasks.slice(0, 4);
    if (m.kind === 'allowances') return m.allowanceRows.map(function (r) { return { label: r.label }; });
    if (m.kind === 'awards') return m.awardRows.map(function (r) { return { label: r.label }; });
    if (m.kind === 'events') return m.events.map(function (r) { return { label: r.name }; });
    return [];
  }

  function renderOverviewPage() {
    var el = document.getElementById('page-overview');
    var g = globalTotals(plan);
    var mo = plan.month;
    var yr = plan.year;
    var detailId = plan.detail;

    var headerHtml = '<header class="ov-header">' +
      '<div class="ov-header-brand"><h1>Administration Department</h1><p>Monthly Plan Dashboard</p></div>' +
      '<div class="ov-header-actions">' +
      '<div class="ov-pill-wrap"><label>Month</label><select id="ov-month">' +
      MONTHS.map(function (name, i) {
        return '<option value="' + (i + 1) + '"' + (mo === i + 1 ? ' selected' : '') + '>' + name + '</option>';
      }).join('') +
      '</select></div>' +
      '<span class="ov-year-badge" id="ov-year-display">' + yr + '</span>' +
      '<input type="number" id="ov-year" value="' + yr + '" min="2020" max="2035" style="width:5rem;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-family:var(--font-dm)" />' +
      '<button type="button" class="ov-btn-reset" id="ov-reset">&#8635; Reset month</button>' +

      '</div></header>';

    var teamHtml = '<div class="ov-team-strip"><span class="ov-team-label" style="font-variant:all-small-caps;letter-spacing:0.14em">Team</span>' +

        return '<div class="ov-chip"><strong>' + esc(t.name) + '</strong>' +

    var sidebarHtml = '<aside class="ov-sidebar">';
    NAV_GROUPS.forEach(function (grp) {

      });
      sidebarHtml += '</div>';

    sidebarHtml += '<div class="ov-sidebar-foot">Overall: ' + g.done + ' / ' + g.total + ' tasks</div></aside>';

    var mainHtml;
    if (detailId) {
      mainHtml = renderDetail(detailId, mo, yr);
    } else {
      mainHtml = '<main class="ov-main">' +
        '<h2>Monthly Overview</h2>' +
        '<p class="sub">All administrative tasks &mdash; ' + MONTHS[mo - 1] + ' ' + yr + '</p>' +
        '<div class="ov-stats">' +
        '<div class="ov-stat"><div class="lbl">Modules</div><div class="num">' + g.modules + '</div></div>' +
        '<div class="ov-stat"><div class="lbl">Total tasks</div><div class="num">' + g.total + '</div></div>' +
        '<div class="ov-stat"><div class="lbl">Completed</div><div class="num">' + g.done + '</div></div>' +
        '<div class="ov-stat"><div class="lbl">Annual events</div><div class="num">' + g.annual + '</div></div>' +
        '</div>' +
        '<div class="ov-grid">' +
        (plan.nav === 'dashboard' ? MODULES : MODULES.filter(function (x) { return x.id === plan.nav; })).map(function (m) {
          var prev = previewTasks(m);
          var show = prev.slice(0, 4);
          var more = prev.length - show.length;
          var done = moduleDoneCount(m, plan);
          var tot = moduleTotalSlots(m);
          var pct = tot ? Math.round(done / tot * 100) : 0;
          return '<article class="ov-card" data-open="' + esc(m.id) + '" style="--card-accent:' + m.accent + ';border-top-color:' + m.accent + '">' +
            '<div class="ov-card-head"><span class="ov-card-emoji">' + m.emoji + '</span><h3 class="ov-card-title">' + esc(m.title) + '</h3></div>' +
            '<ul>' + show.map(function (t) { return '<li>' + esc(t.label) + '</li>'; }).join('') + '</ul>' +
            (more > 0 ? '<div class="ov-card-more">+' + more + ' more</div>' : '') +
            '<div class="ov-card-foot"><span class="ov-freq">' + freqLabel(m.freq) + '</span>' +
            (tot ? '<div class="ov-mini-track"><div class="ov-mini-fill" style="width:' + pct + '%"></div></div><span class="ov-mini-frac">' + done + '/' + tot + '</span>' : '<span class="ov-mini-frac"></span>') +
            '</div></article>';
        }).join('') +
        '</div></main>';
    }

    el.innerHTML = headerHtml + '<div class="ov-shell">' + sidebarHtml + mainHtml + '</div>';
    bindOverviewEvents(el);
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function navBadge(navId, pl) {
    if (navId === 'dashboard') {
      var g = globalTotals(pl);
      return g.done + '/' + g.total;
    }
    var m = modById(navId);
    if (!m) return '\u2014';
    var d = moduleDoneCount(m, pl);
    var t = moduleTotalSlots(m);
    return d + '/' + t;
  }

  function renderDetail(detailId, mo, yr) {
    var m = modById(detailId);
    if (!m) return '<main class="ov-main"><p>Module not found.</p></main>';
    var done = moduleDoneCount(m, plan);
    var tot = moduleTotalSlots(m);
    var pct = tot ? Math.round(done / tot * 100) : 0;
    var head = '<main class="ov-main">' +
      '<button type="button" class="ov-detail-back" id="ov-back">\u2190 Back</button>' +
      '<div class="ov-detail-head">' +
      '<div class="ov-detail-left">' +
      '<div class="ov-detail-icon">' + m.emoji + '</div>' +
      '<div><h2>' + esc(m.title) + '</h2><p class="desc">' + esc(m.desc) + '</p></div></div>' +
      '<span class="ov-freq ' + freqClass(m.freq) + ' ov-freq-pos">' + freqLabel(m.freq) + '</span></div>' +
      '<div class="ov-progress-row"><div class="bar"><div class="fill" style="width:' + pct + '%"></div></div>' +
      '<div class="ov-progress-meta"><span>' + pct + '%</span><span>' + done + ' / ' + tot + '</span></div></div>';

    var body = '';
    if (m.kind === 'insurance') {
      body += '<div class="ov-insurance-boxes"><div class="ov-info-box"><strong>' + esc(m.lifeTitle) + '</strong>Renewals, membership changes, and life claims.</div>' +
        '<div class="ov-info-box"><strong>' + esc(m.generalTitle) + '</strong>Valuations, general cover, and claims.</div></div>';
      body += '<div class="ov-task-card">';
      m.lifeTasks.forEach(function (t, i) {
        body += taskRow(m.id + ':life:' + i, t.label, t.sub, plan.checks[m.id + ':life:' + i]);
      });
      m.generalTasks.forEach(function (t, i) {
        body += taskRow(m.id + ':gen:' + i, t.label, t.sub, plan.checks[m.id + ':gen:' + i]);
      });
      body += '</div>';
    } else if (m.kind === 'awards') {
      body += '<div class="ov-table-wrap"><table class="ov-data-table"><thead><tr><th>Programme</th><th>Status</th></tr></thead><tbody>';
      m.awardRows.forEach(function (r, i) {
        var key = m.id + ':' + i;
        var st = plan.awards[key] || 'Pending';
        var cls = st === 'Awarded' ? ' sel-green' : st === 'Nominated' ? ' sel-amber' : '';
        body += '<tr><td>' + esc(r.label) + '</td><td><select class="' + cls + '" data-award="' + esc(key) + '">' +
          ['Pending', 'Nominated', 'Awarded'].map(function (o) {
            return '<option' + (st === o ? ' selected' : '') + '>' + o + '</option>';
          }).join('') + '</select></td></tr>';
      });
      body += '</tbody></table></div>';
    } else if (m.kind === 'allowances') {
      body += '<div class="ov-table-wrap"><table class="ov-data-table"><thead><tr><th>Allowance</th><th>Status</th></tr></thead><tbody>';
      m.allowanceRows.forEach(function (r, i) {
        var key = m.id + ':' + i;
        var st = plan.allowances[key] || 'Pending';
        var cls = st === 'Paid' ? ' sel-green' : st === 'Processed' ? ' sel-amber' : '';
        body += '<tr><td>' + esc(r.label) + '</td><td><select class="' + cls + '" data-allow="' + esc(key) + '">' +
          ['Pending', 'Processed', 'Paid'].map(function (o) {
            return '<option' + (st === o ? ' selected' : '') + '>' + o + '</option>';
          }).join('') + '</select></td></tr>';
      });
      body += '</tbody></table></div>';
    } else if (m.kind === 'events') {
      body += '<div class="ov-event-grid">';
      m.events.forEach(function (ev, i) {
        var on = !!plan.checks[m.id + ':ev:' + i];
        body += '<article class="ov-event-card" data-evkey="' + esc(m.id + ':ev:' + i) + '" style="cursor:pointer;outline:' + (on ? '2px solid var(--ov-green)' : 'none') + '">' +
          '<div class="ov-event-date"><div class="mo">' + esc(ev.month) + '</div><div class="day">' + esc(ev.day) + '</div></div>' +
          '<div class="ov-event-body"><h4>' + esc(ev.name) + '</h4><p>' + esc(ev.desc) + '</p><p style="margin-top:8px;font-size:0.7rem;color:var(--ov-muted)">' + (on ? 'Marked complete' : 'Click card to toggle') + '</p></div></article>';
      });
      body += '</div>';
    } else {
      body += '<div class="ov-task-card">';
      m.tasks.forEach(function (t, i) {
        body += taskRow(m.id + ':' + i, t.label, t.sub, plan.checks[m.id + ':' + i]);
      });
      body += '</div>';
    }
    return head + body + '</main>';
  }

  function taskRow(key, label, sub, on) {
    return '<div class="ov-task-row" data-check-key="' + esc(key) + '">' +
      '<div class="ov-cb' + (on ? ' on' : '') + '">' + (on ? checkSvg() : '') + '</div>' +
      '<div class="ov-task-mid"><div class="name' + (on ? ' done' : '') + '">' + esc(label) + '</div>' +
      (sub ? '<div class="sub">' + esc(sub) + '</div>' : '') + '</div>' +
      '<span class="ov-tag">Task</span></div>';
  }

  function bindOverviewEvents(root) {
    var monthEl = root.querySelector('#ov-month');
    var yearEl = root.querySelector('#ov-year');
    if (monthEl) monthEl.addEventListener('change', function () {
      plan.month = +monthEl.value;
      savePlan(plan);
      renderOverviewPage();
    });
    if (yearEl) yearEl.addEventListener('change', function () {
      plan.year = +yearEl.value || plan.year;
      savePlan(plan);
      renderOverviewPage();
    });
    var yrDisp = root.querySelector('#ov-year-display');
    if (yearEl && yrDisp) yearEl.addEventListener('input', function () { yrDisp.textContent = yearEl.value; });

    var resetBtn = root.querySelector('#ov-reset');
    if (resetBtn) resetBtn.addEventListener('click', function () {
      if (!confirm('Reset this month? All checkboxes and award/allowance progress will be cleared.')) return;
      plan.checks = {};
      plan.awards = {};
      plan.allowances = {};
      savePlan(plan);
      renderOverviewPage();
    });

    var finBtn = root.querySelector('#ov-open-finance');
    if (finBtn) finBtn.addEventListener('click', function () { showFinancePage(); });

    root.querySelectorAll('[data-nav]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        plan.nav = btn.getAttribute('data-nav');
        plan.detail = null;
        savePlan(plan);
        renderOverviewPage();
      });
    });

    root.querySelectorAll('[data-open]').forEach(function (card) {
      card.addEventListener('click', function () {
        plan.detail = card.getAttribute('data-open');
        plan.nav = plan.detail;
        savePlan(plan);
        renderOverviewPage();
      });
    });

    var back = root.querySelector('#ov-back');
    if (back) back.addEventListener('click', function () {
      plan.detail = null;
      plan.nav = 'dashboard';
      savePlan(plan);
      renderOverviewPage();
    });

    root.querySelectorAll('[data-check-key]').forEach(function (row) {
      row.addEventListener('click', function () {
        var k = row.getAttribute('data-check-key');
        plan.checks[k] = !plan.checks[k];
        savePlan(plan);
        renderOverviewPage();
      });
    });

    root.querySelectorAll('[data-evkey]').forEach(function (card) {
      card.addEventListener('click', function () {
        var k = card.getAttribute('data-evkey');
        plan.checks[k] = !plan.checks[k];
        savePlan(plan);
        renderOverviewPage();
      });
    });

    root.querySelectorAll('[data-award]').forEach(function (sel) {
      sel.addEventListener('change', function () {
        plan.awards[sel.getAttribute('data-award')] = sel.value;
        sel.className = sel.value === 'Awarded' ? 'sel-green' : sel.value === 'Nominated' ? 'sel-amber' : '';
        savePlan(plan);
        renderOverviewPage();
      });
    });

    root.querySelectorAll('[data-allow]').forEach(function (sel) {
      sel.addEventListener('change', function () {
        plan.allowances[sel.getAttribute('data-allow')] = sel.value;
        sel.className = sel.value === 'Paid' ? 'sel-green' : sel.value === 'Processed' ? 'sel-amber' : '';
        savePlan(plan);
        renderOverviewPage();
      });
    });
  }

  function defaultFinRows() {
    return [
      { name: 'Preparing Bank Reconciliation of Radna Tea (Pvt) Ltd banks', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Preparing for Bank Reconciliation', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Monthly Collection & Deposit Report', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Monthly Cash Collection & Bank Deposit Report', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Sales Commission', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Stock Shortage Report', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Petty Cash Reconciliation', status: 'PLANNING', submitted: '', notes: ['', '', '', ''], done: false },
      { name: 'Accounts Payable Review', status: 'IN PROGRESS', submitted: '', notes: ['reviewing', '', '', ''], done: false },
      { name: 'Payroll Processing for March', status: 'DONE', submitted: '', notes: ['', 'done', '', ''], done: true }
    ];
  }

  function normalizeFinRows(rows) {
    rows.forEach(function (r) {
      if (!r.notes || !Array.isArray(r.notes)) r.notes = ['', '', '', ''];
      while (r.notes.length < 4) r.notes.push('');
    });
    return rows;
  }

  function loadFin() {
    try {
      var r = localStorage.getItem(LS_FIN_ROWS);
      var rows = r ? JSON.parse(r) : null;
      if (!rows || !Array.isArray(rows) || rows.length === 0) rows = defaultFinRows();
      normalizeFinRows(rows);
      var h = localStorage.getItem(LS_FIN_HEADERS);
      var headers = h ? JSON.parse(h) : null;
      if (!headers || !Array.isArray(headers) || headers.length < 4) {
        headers = ['Lumindu', 'Shehan', 'Thilini', 'Noshitha'];
      }
      var meta = {};
      try { meta = JSON.parse(localStorage.getItem(LS_FIN_META) || '{}'); } catch (e2) {}
      return {
        rows: rows,
        headers: headers,
        planTitle: meta.planTitle || 'march finance audit',
        month: meta.month || 3,
        year: meta.year || 2026
      };
    } catch (e) {
      return {
        rows: normalizeFinRows(defaultFinRows()),
        headers: ['Lumindu', 'Shehan', 'Thilini', 'Noshitha'],
        planTitle: 'march finance audit',
        month: 3,
        year: 2026
      };
    }
  }

  function saveFin(f) {
    localStorage.setItem(LS_FIN_ROWS, JSON.stringify(f.rows));
    localStorage.setItem(LS_FIN_HEADERS, JSON.stringify(f.headers));
    localStorage.setItem(LS_FIN_META, JSON.stringify({
      planTitle: f.planTitle,
      month: f.month,
      year: f.year
    }));
  }

  function pad3(n) {
    var s = String(n);
    return s.length >= 3 ? s : '000'.slice(s.length) + s;
  }

  var fin = loadFin();

  function finStatusClass(s) {
    var x = (s || '').toUpperCase();
    if (x === 'PLANNING') return 'fn-status-planning';
    if (x === 'IN PROGRESS') return 'fn-status-progress';
    if (x === 'REVIEW') return 'fn-status-review';
    if (x === 'DONE') return 'fn-status-done';
    if (x === 'BLOCKED') return 'fn-status-blocked';
    return 'fn-status-planning';
  }

  function renderFinancePage() {
    var host = document.getElementById('page-finance');
    var total = fin.rows.length;
    var doneC = fin.rows.filter(function (r) { return r.done; }).length;
    var pct = total ? Math.round(doneC / total * 100) : 0;
    var st = { PLANNING: 0, PROGRESS: 0, REVIEW: 0, DONE: 0, BLOCKED: 0 };
    fin.rows.forEach(function (r) {
      var u = (r.status || '').toUpperCase();
      if (u === 'PLANNING') st.PLANNING++;
      else if (u === 'IN PROGRESS') st.PROGRESS++;
      else if (u === 'REVIEW') st.REVIEW++;
      else if (u === 'DONE') st.DONE++;
      else if (u === 'BLOCKED') st.BLOCKED++;
      else st.PLANNING++;
    });
    var sub = fin.planTitle + ' \u00B7 ' + MONTHS[fin.month - 1] + ' ' + fin.year;
    var html = '<div class="fn-page">' +
      '<header class="fn-top"><div class="fn-top-left">' +
      '<button type="button" class="fn-back" id="fn-back">\u2190 Back to plans</button><span class="fn-divider"></span>' +
      '<div class="fn-icon-box">\uD83D\uDCB2</div><div class="fn-titles"><h1>Finance execution sheet</h1><p id="fn-sub">' + esc(sub) + '</p></div></div>' +
      '<div class="fn-top-right"><div class="fn-completion"><span>Complete</span><div class="fn-pill-track"><div class="fn-pill-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="fn-pct">' + pct + '%</span></div>' +
      '<button type="button" class="fn-btn-ghost" id="fn-add-row">+ Add row</button>' +
      '<button type="button" class="fn-btn-primary" id="fn-update"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg> Update sheet</button>' +
      '</div></header>' +
      '<div class="fn-meta">' +
      '<div class="fn-field title"><label>Plan title</label><input type="text" id="fn-plan-title" value="' + esc(fin.planTitle) + '" /></div>' +
      '<div class="fn-field"><label>Month</label><select id="fn-month">' + MONTHS.map(function (n, i) {
        return '<option value="' + (i + 1) + '"' + (fin.month === i + 1 ? ' selected' : '') + '>' + n + '</option>';
      }).join('') + '</select></div>' +
      '<div class="fn-field"><label>Year</label><input type="number" id="fn-year" value="' + fin.year + '" min="2020" max="2035" /></div></div>' +
      '<div class="fn-stats">' +
      '<div class="fn-stat-cell"><div class="dot" style="background:#8b949e"></div><div class="n">' + total + '</div><div class="lbl">Total tasks</div></div>' +
      '<div class="fn-stat-cell"><div class="dot" style="background:var(--fn-sky)"></div><div class="n">' + st.PLANNING + '</div><div class="lbl">Planning</div></div>' +
      '<div class="fn-stat-cell"><div class="dot" style="background:var(--fn-amber)"></div><div class="n">' + st.PROGRESS + '</div><div class="lbl">In progress</div></div>' +
      '<div class="fn-stat-cell"><div class="dot" style="background:var(--fn-emerald)"></div><div class="n">' + st.DONE + '</div><div class="lbl">Done</div></div>' +
      '<div class="fn-stat-cell"><div class="dot" style="background:var(--fn-red)"></div><div class="n">' + st.BLOCKED + '</div><div class="lbl">Blocked</div></div>' +
      '</div>' +
      '<div class="fn-table-scroll"><table class="fn-table"><thead><tr>' +
      '<th>#</th><th>Task</th><th>Status</th><th>Submitted</th>' +
      '<th class="sortable center" data-hidx="0">' + esc(fin.headers[0]) + '</th>' +
      '<th class="sortable center" data-hidx="1">' + esc(fin.headers[1]) + '</th>' +
      '<th class="sortable center" data-hidx="2">' + esc(fin.headers[2]) + '</th>' +
      '<th class="sortable center" data-hidx="3">' + esc(fin.headers[3]) + '</th>' +
      '<th class="center">Done</th><th></th></tr></thead><tbody id="fn-tbody">' +
      fin.rows.map(function (row, idx) { return finRowHtml(row, idx, fin.headers); }).join('') +
      '</tbody></table></div></div>';
    host.innerHTML = html;
    bindFinanceEvents(host);
  }

  function finRowHtml(row, idx, headers) {
    var initials = ['LU', 'SH', 'TH', 'NO'];
    var avClass = ['sky', 'emerald', 'purple', 'amber'];
    var cells = '';
    for (var c = 0; c < 4; c++) {
      var note = (row.notes[c] || '');
      var has = note.length > 0 ? ' has-note' : '';
      cells += '<td class="fn-assign"><div class="fn-av ' + avClass[c] + has + '">' + initials[c] + '</div>' +
        '<input type="text" class="fn-note" data-note="' + idx + ':' + c + '" placeholder="note\u2026" value="' + esc(note) + '" /></td>';
    }
    var opts = ['PLANNING', 'IN PROGRESS', 'REVIEW', 'DONE', 'BLOCKED'].map(function (o) {
      return '<option value="' + o + '"' + ((row.status || '').toUpperCase() === o ? ' selected' : '') + '>' + o + '</option>';
    }).join('');
    return '<tr class="' + (row.done ? 'row-done' : '') + '" style="animation-delay:' + (idx * 0.03) + 's">' +
      '<td class="fn-idx">' + (idx + 1) + '</td>' +
      '<td><div class="fn-task-code">TASK-' + pad3(idx + 1) + '</div>' +
      '<div class="fn-task-name" contenteditable="true" data-name="' + idx + '">' + esc(row.name) + '</div></td>' +
      '<td><select class="fn-status-select ' + finStatusClass(row.status) + '" data-status="' + idx + '">' + opts + '</select></td>' +
      '<td><input type="text" class="fn-submitted" data-sub="' + idx + '" placeholder="date / ref" value="' + esc(row.submitted || '') + '" /></td>' +
      cells +
      '<td class="fn-done-wrap"><button type="button" class="fn-done-cb' + (row.done ? ' on' : '') + '" data-done="' + idx + '">' + (row.done ? '<svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="currentColor" stroke-width="1.5"/></svg>' : '') + '</button></td>' +
      '<td><button type="button" class="fn-del" data-del="' + idx + '" aria-label="Delete">\u00D7</button></td></tr>';
  }

  function bindFinanceEvents(host) {
    function refreshFinMeta() {
      var subEl = host.querySelector('#fn-sub');
      if (subEl) subEl.textContent = fin.planTitle + ' \u00B7 ' + MONTHS[fin.month - 1] + ' ' + fin.year;
    }
    host.querySelector('#fn-back').addEventListener('click', showOverviewPage);
    host.querySelector('#fn-plan-title').addEventListener('input', function (e) {
      fin.planTitle = e.target.value;
      refreshFinMeta();
      saveFin(fin);
    });
    host.querySelector('#fn-month').addEventListener('change', function (e) {
      fin.month = +e.target.value;
      refreshFinMeta();
      saveFin(fin);
    });
    host.querySelector('#fn-year').addEventListener('input', function (e) {
      fin.year = +e.target.value || fin.year;
      refreshFinMeta();
      saveFin(fin);
    });
    host.querySelector('#fn-update').addEventListener('click', function () {
      saveFin(fin);
      showToast('Sheet updated & saved \u2713');
    });
    host.querySelectorAll('[data-hidx]').forEach(function (th) {
      th.addEventListener('click', function () {
        var i = +th.getAttribute('data-hidx');
        var n = window.prompt('Column name', fin.headers[i]);
        if (n && n.trim()) { fin.headers[i] = n.trim(); saveFin(fin); renderFinancePage(); }
      });
    });
    host.querySelectorAll('[data-name]').forEach(function (el) {
      el.addEventListener('blur', function () {
        var i = +el.getAttribute('data-name');
        fin.rows[i].name = el.textContent.trim() || fin.rows[i].name;
        saveFin(fin);
      });
    });
    host.querySelectorAll('[data-status]').forEach(function (sel) {
      sel.addEventListener('change', function () {
        var i = +sel.getAttribute('data-status');
        fin.rows[i].status = sel.value;
        sel.className = 'fn-status-select ' + finStatusClass(sel.value);
        if (sel.value === 'DONE') { fin.rows[i].done = true; }
        saveFin(fin);
        renderFinancePage();
      });
    });
    host.querySelectorAll('[data-sub]').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var i = +inp.getAttribute('data-sub');
        fin.rows[i].submitted = inp.value;
        saveFin(fin);
      });
    });
    host.querySelectorAll('[data-note]').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var p = inp.getAttribute('data-note').split(':');
        var ri = +p[0], ci = +p[1];
        if (!fin.rows[ri].notes) fin.rows[ri].notes = ['', '', '', ''];
        fin.rows[ri].notes[ci] = inp.value;
        saveFin(fin);
        renderFinancePage();
      });
    });
    host.querySelectorAll('[data-done]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var i = +btn.getAttribute('data-done');
        fin.rows[i].done = !fin.rows[i].done;
        if (fin.rows[i].done) fin.rows[i].status = 'DONE';
        saveFin(fin);
        renderFinancePage();
      });
    });
    host.querySelectorAll('[data-del]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var i = +btn.getAttribute('data-del');
        fin.rows.splice(i, 1);
        saveFin(fin);
        renderFinancePage();
      });
    });
    host.querySelector('#fn-add-row').addEventListener('click', function () {
      openFinModal();
    });
  }

  function openFinModal() {
    var overlay = document.createElement('div');
    overlay.className = 'fn-modal-overlay';
    overlay.innerHTML = '<div class="fn-modal"><h2>\u2728 Add new task</h2><label>Task name</label><textarea id="fn-modal-ta" placeholder="Describe the task"></textarea>' +
      '<label>Status</label><select id="fn-modal-st" style="width:100%;margin-top:6px;padding:8px;border-radius:8px;background:var(--fn-surface2);border:1px solid var(--fn-border);color:#e6edf3">' +
      '<option>PLANNING</option><option>IN PROGRESS</option><option>REVIEW</option><option>DONE</option><option>BLOCKED</option></select>' +
      '<div class="actions"><button type="button" class="fn-btn-ghost" id="fn-mod-cancel">Cancel</button>' +
      '<button type="button" class="fn-btn-primary" id="fn-mod-add">Add task</button></div></div>';
    document.body.appendChild(overlay);
    function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
    overlay.querySelector('#fn-mod-cancel').addEventListener('click', close);
    overlay.querySelector('#fn-mod-add').addEventListener('click', function () {
      var ta = overlay.querySelector('#fn-modal-ta');
      var st = overlay.querySelector('#fn-modal-st').value;
      if (!ta.value.trim()) { ta.classList.add('err'); return; }
      ta.classList.remove('err');
      fin.rows.push({ name: ta.value.trim(), status: st, submitted: '', notes: ['', '', '', ''], done: st === 'DONE' });
      saveFin(fin);
      close();
      renderFinancePage();
    });
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'fn-toast';
    t.textContent = msg;
    document.getElementById('toast-host').appendChild(t);
    setTimeout(function () { t.remove(); }, 2500);
  }

  function showFinancePage() {
    document.body.classList.remove('ov-active');
    document.body.classList.add('fn-active');
    document.getElementById('page-overview').classList.add('page-hidden');
    document.getElementById('page-overview').classList.remove('page-flex');
    document.getElementById('page-finance').classList.remove('page-hidden');
    document.getElementById('page-finance').classList.add('page-flex');
    fin = loadFin();
    if (!fin.planTitle) fin.planTitle = 'march finance audit';
    if (!localStorage.getItem(LS_FIN_ROWS)) saveFin(fin);
    renderFinancePage();
  }

  function showOverviewPage() {
    document.body.classList.add('ov-active');
    document.body.classList.remove('fn-active');
    document.getElementById('page-finance').classList.add('page-hidden');
    document.getElementById('page-finance').classList.remove('page-flex');
    document.getElementById('page-overview').classList.remove('page-hidden');
    document.getElementById('page-overview').classList.add('page-flex');
    plan = loadPlan();
    renderOverviewPage();
  }

  renderOverviewPage();
})();
  </script>
</body>
</html>
